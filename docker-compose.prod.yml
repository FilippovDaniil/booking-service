# ============================================================
#  docker-compose.prod.yml — продакшн конфигурация
#
#  ОТЛИЧИЕ ОТ docker-compose.yml:
#    docker-compose.yml        — для локальной разработки (собирает из исходников)
#    docker-compose.prod.yml   — для продакшн/CI деплоя (использует готовый образ из registry)
#
#  ЗАПУСК:
#    docker-compose -f docker-compose.prod.yml up -d
#
#  ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ:
#    Задаются в файле .env рядом с этим файлом (НЕ коммитить в git!).
#    Пример .env файла — в .env.example
# ============================================================

version: '3.8'

services:

  # ---- Приложение Spring Boot ----
  app:
    # Образ из GitLab Container Registry (публикуется в CI pipeline)
    image: ${CI_REGISTRY_IMAGE}/booking-service:latest
    container_name: booking-app
    restart: unless-stopped   # автоматически перезапускать при падении
    ports:
      - "8555:8555"
    environment:
      # Подключение к PostgreSQL (другой контейнер из этого же compose)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # JWT секрет — должен быть длинным и уникальным
      JWT_SECRET: ${JWT_SECRET}

      # Spring профиль
      SPRING_PROFILES_ACTIVE: prod

    depends_on:
      postgres:
        condition: service_healthy   # ждём пока PostgreSQL не будет готов
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

    # Healthcheck: раз в 30 секунд проверяем /actuator/health
    # Требует spring-boot-starter-actuator в зависимостях
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8555/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # даём 60 секунд на старт JVM

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine   # alpine — облегчённая версия
    container_name: booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # данные сохраняются между перезапусками
    # Healthcheck: проверяем готовность PostgreSQL принимать запросы
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: booking-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Zookeeper (нужен для Kafka) ----
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: booking-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  # ---- Kafka ----
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: booking-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Два listener-а: внутри Docker-сети и снаружи
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

# Именованные volumes — данные хранятся в Docker, не привязаны к папке на хосте
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
