# ============================================================
# 06-loki.yaml — Сервер хранения и поиска логов (Grafana Loki 3.1.0)
#
# Loki получает логи от приложения через HTTP (loki4j appender в logback-spring.xml).
# Grafana читает логи из Loki для отображения дашбордов.
#
# Схема:
#   Spring Boot → [Loki4j HTTP push] → Loki:3100 → [Grafana datasource] → Grafana
#
# ⚠️  ОБЯЗАТЕЛЬНО: securityContext.runAsUser: 0
# PVC создаётся с правами root.
# Loki 2.x+ запускается от UID 10001 → "Permission denied" при записи в /loki.
# Решение: запускать от root (UID 0), как делается в docker-compose через user: "0".
#
# Конфигурация берётся из ConfigMap и монтируется как файл /etc/loki/local-config.yaml.
# ============================================================

# --- Объект 1: ConfigMap с конфигурацией Loki ---
# ConfigMap хранит несекретные данные. Здесь — файл конфигурации Loki.
# Ключ "local-config.yaml" становится именем файла при монтировании в том.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config      # Имя ConfigMap — используется в volumes.configMap.name ниже
  namespace: pet-booking
data:
  local-config.yaml: |   # Содержимое файла /etc/loki/local-config.yaml внутри контейнера
    auth_enabled: false  # Без аутентификации — нормально для dev-среды

    server:
      http_listen_port: 3100  # HTTP API Loki. Grafana и приложение подключаются сюда.

    common:
      instance_addr: 127.0.0.1  # Адрес этого экземпляра Loki
      path_prefix: /loki        # Все данные хранятся в /loki (монтируем PVC туда)
      storage:
        filesystem:
          chunks_directory: /loki/chunks  # Сами данные логов (chunks)
          rules_directory: /loki/rules    # Правила алертинга (пусто в dev)
      replication_factor: 1               # Один экземпляр — одна реплика (dev-режим)
      ring:
        kvstore:
          store: inmemory                 # KV-store для координации в памяти (нет Redis/etcd)

    schema_config:
      configs:
        - from: 2020-10-24   # Дата начала применения этой схемы
          store: tsdb          # TSDB (Time Series DB) — движок хранения Loki 3.x
          object_store: filesystem  # Хранить на файловой системе (в /loki/chunks)
          schema: v13          # Версия схемы. v13 — актуальная для Loki 3.x
          index:
            prefix: index_     # Префикс файлов индекса
            period: 24h        # Новый файл индекса каждые 24 часа

    limits_config:
      reject_old_samples: true           # Отклонять логи с "устаревшей" меткой времени
      reject_old_samples_max_age: 168h   # Максимальный возраст принимаемых логов = 7 дней

    analytics:
      reporting_enabled: false  # Не отправлять анонимную статистику в Grafana Labs

---
# --- Объект 2: PersistentVolumeClaim ---
# Дисковое хранилище для данных Loki (/loki/chunks и /loki/rules).
# Без PVC логи исчезнут при перезапуске пода.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-pvc
  namespace: pet-booking
spec:
  accessModes:
    - ReadWriteOnce  # Один под одновременно — у нас replicas: 1
  resources:
    requests:
      storage: 2Gi   # 2 ГБ — хватит на ~7 дней логов активного приложения

---
# --- Объект 3: Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: pet-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      # ⚠️  ОБЯЗАТЕЛЬНО: PVC создаётся с правами root (UID 0).
      # Loki 2.x+ запускается от UID 10001 → "Permission denied" при попытке писать в /loki.
      # Решение: запускать от root (UID 0) как в docker-compose через user: "0".
      securityContext:
        runAsUser: 0   # UID 0 = root

      containers:
        - name: loki
          image: grafana/loki:3.1.0  # Та же версия что в docker-compose.yml
          args:
            - -config.file=/etc/loki/local-config.yaml  # Указываем путь к конфигу
                                                          # Файл монтируется из ConfigMap ниже
          ports:
            - containerPort: 3100  # HTTP API Loki — сюда шлют логи и читает Grafana
          volumeMounts:
            - name: config
              mountPath: /etc/loki    # Монтируем ConfigMap как директорию
                                      # /etc/loki/local-config.yaml ← ключ из ConfigMap
            - name: data
              mountPath: /loki        # Монтируем PVC для хранения данных
          readinessProbe:
            httpGet:
              path: /ready            # Loki предоставляет endpoint /ready когда готов к работе
              port: 3100
            initialDelaySeconds: 15   # Loki инициализирует хранилище — нужно ~10-15 сек
            periodSeconds: 5
            failureThreshold: 6

      volumes:
        - name: config
          configMap:
            name: loki-config         # Монтируем ConfigMap "loki-config" как директорию
                                      # Каждый ключ ConfigMap = файл в директории
        - name: data
          persistentVolumeClaim:
            claimName: loki-pvc       # Монтируем диск из PVC

---
# --- Объект 4: Service ---
# Loki не нужен снаружи кластера — только приложение и Grafana обращаются к нему.
# Имя "loki" совпадает с:
#   - LOKI_URL в ConfigMap приложения: http://loki:3100
#   - datasource URL в Grafana: http://loki:3100
apiVersion: v1
kind: Service
metadata:
  name: loki           # DNS-имя: loki.pet-booking.svc.cluster.local
  namespace: pet-booking
spec:
  selector:
    app: loki
  ports:
    - port: 3100       # HTTP API порт Loki
      targetPort: 3100
  type: ClusterIP      # Только внутри кластера — не нужен доступ снаружи
