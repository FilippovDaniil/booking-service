# ============================================================
# 01-secrets.yaml — Чувствительные данные (пароли, ключи)
#
# Secret vs ConfigMap:
#   ConfigMap — несекретные настройки (URL, имена сервисов, флаги)
#   Secret     — пароли, токены, ключи. Хранятся base64 в etcd.
#                Доступ ограничивается через RBAC.
#
# ВАЖНО: base64 — это кодирование, а НЕ шифрование.
# Прочитать значение: kubectl get secret booking-secrets -n pet-booking \
#                      -o jsonpath='{.data.db-password}' | base64 -d
#
# type: Opaque — произвольный набор ключ-значение (в отличие от
# kubernetes.io/tls, kubernetes.io/dockerconfigjson и т.д.)
#
# stringData: — принимает plain-text. K8s сам кодирует в base64 при сохранении.
# data: — принимает уже закодированные base64 значения.
#
# Ссылка на Secret в других файлах:
#   env:
#     - name: MY_VAR
#       valueFrom:
#         secretKeyRef:
#           name: booking-secrets   ← имя этого Secret
#           key: db-password        ← ключ внутри Secret
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: booking-secrets  # Имя Secret — используется в secretKeyRef во всех Deployment'ах
  namespace: pet-booking
type: Opaque             # Произвольный тип — наш набор ключ-значение
stringData:
  db-password: "1234"   # Пароль PostgreSQL. Совпадает с POSTGRES_PASSWORD в 02-postgres.yaml.
                         # В продакшне заменить на длинный случайный: openssl rand -base64 32

  jwt-secret: "verySecretKeyThatIsAtLeast256bitsLongForHS256Algorithm1234567890"
                         # Секрет для подписи JWT-токенов.
                         # HS256 требует ключ минимум 256 бит = 32 символа.
                         # В продакшне: openssl rand -hex 64
