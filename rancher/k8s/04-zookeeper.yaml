# ============================================================
# 04-zookeeper.yaml — Координатор кластера Kafka (ZooKeeper)
#
# ZooKeeper — служба координации, необходимая для Kafka.
# Kafka использует ZooKeeper для:
#   - Хранения конфигурации брокеров
#   - Выбора лидера партиций
#   - Учёта consumer groups
#
# ПОРЯДОК ЗАПУСКА: ZooKeeper должен быть готов ДО Kafka.
# Kafka-под ждёт ZooKeeper через initContainer (см. 05-kafka.yaml).
#
# Примечание: Kafka 3.x+ поддерживает режим без ZooKeeper (KRaft),
# но Confluent 7.6.0 всё ещё использует ZooKeeper-режим.
# ============================================================

# --- Объект 1: Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: pet-booking
spec:
  replicas: 1           # Один экземпляр ZooKeeper — для dev/test достаточно
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0  # Confluent ZooKeeper — совместим с cp-kafka:7.6.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"    # Порт для подключения Kafka. Стандартный ZooKeeper-порт.
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"    # Базовая единица времени ZooKeeper в мс.
                               # Таймауты сессий = 2× или более tickTime.
          ports:
            - containerPort: 2181  # ZooKeeper client port
          readinessProbe:
            tcpSocket:
              port: 2181   # Проверяем что порт открыт (TCP соединение).
                           # Используем tcpSocket вместо exec потому что
                           # nc команды в разных версиях образа работают по-разному.
            initialDelaySeconds: 10  # ZooKeeper стартует ~5-10 сек
            periodSeconds: 5
            failureThreshold: 6

---
# --- Объект 2: Service ---
# Kafka подключается к ZooKeeper по имени "zookeeper" через переменную
# KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181 (см. 05-kafka.yaml)
apiVersion: v1
kind: Service
metadata:
  name: zookeeper      # DNS-имя: zookeeper.pet-booking.svc.cluster.local
                       # Совпадает с docker-compose сервисом "zookeeper"
  namespace: pet-booking
spec:
  selector:
    app: zookeeper     # Трафик → поды с label app=zookeeper
  ports:
    - port: 2181       # ZooKeeper client port
      targetPort: 2181
  type: ClusterIP      # Только внутри кластера — только Kafka подключается к ZooKeeper
