# ============================================================
# 00-namespace.yaml — Изолированное пространство имён для стека
#
# Namespace — логический раздел внутри K8s-кластера.
# Все ресурсы стека (Deployments, Services, PVC) будут в namespace "pet-booking".
#
# Зачем нужен отдельный namespace:
#   - Изоляция: `kubectl get pods` без -n не покажет наши поды
#   - Удобный полный сброс: kubectl delete namespace pet-booking
#     удаляет ВСЁЁ что внутри — не нужно удалять каждый ресурс отдельно
#
# Применяется ПЕРВЫМ — до всех остальных файлов.
# ============================================================

apiVersion: v1       # Базовая версия Kubernetes API (для Namespace, Pod, Service, Secret и т.д.)
kind: Namespace      # Тип объекта — пространство имён
metadata:
  name: pet-booking  # Имя namespace. Это значение прописано в поле namespace: у ВСЕХ остальных ресурсов.
                     # Если сменить здесь — надо сменить везде.
