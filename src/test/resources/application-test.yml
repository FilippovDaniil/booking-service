spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  main:
    allow-bean-definition-overriding: true

opensearch:
  enabled: false   # бин OpenSearchClient не создаётся → все тесты без OpenSearch

jwt:
  secret: testSecretKeyThatIsAtLeast256bitsLongForHS256AlgorithmUsedInTests
  access-expiration-ms: 900000
  refresh-expiration-days: 30

booking:
  pending-expiration-minutes: 15

server:
  port: 0
