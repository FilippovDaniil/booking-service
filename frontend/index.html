<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetBooking — Аренда жилья</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #2d3748; }

.navbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e2e8f0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 64px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.nav-brand { font-size: 20px; font-weight: 700; color: #0f172a; }
.nav-brand span { color: #6366f1; }
.nav-actions { display: flex; gap: 10px; }

.hero {
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
  padding: 72px 40px 60px; text-align: center; color: #fff;
}
.hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
.hero p  { font-size: 18px; color: #c7d2fe; margin-bottom: 40px; }

.search-box {
  background: #fff; border-radius: 18px; padding: 24px 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  max-width: 860px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr 1fr 100px auto;
  gap: 14px; align-items: end;
}
.search-box .fg label { display: block; font-size: 11px; font-weight: 600; color: #6366f1; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.search-box input, .search-box select {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid #e2e8f0; border-radius: 9px;
  font-size: 14px; color: #1e293b; outline: none; transition: border-color 0.18s;
}
.search-box input:focus { border-color: #6366f1; }

.section-title { padding: 40px 40px 20px; font-size: 20px; font-weight: 700; color: #0f172a; }
.apt-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px; padding: 0 40px 60px;
}
.apt-card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s; cursor: pointer;
}
.apt-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.apt-thumb { height: 165px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
.apt-body { padding: 16px; }
.apt-name { font-weight: 600; font-size: 16px; color: #0f172a; margin-bottom: 3px; }
.apt-city { font-size: 13px; color: #64748b; margin-bottom: 10px; }
.apt-footer { display: flex; align-items: center; justify-content: space-between; }
.apt-price { font-size: 18px; font-weight: 700; color: #6366f1; }
.apt-price span { font-size: 12px; font-weight: 400; color: #94a3b8; }
.apt-rating { font-size: 12px; color: #64748b; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; border-radius: 9px; font-size: 14px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.18s;
}
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-outline { background: transparent; color: #6366f1; border: 1.5px solid #6366f1; }
.btn-outline:hover { background: #6366f1; color: #fff; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.55);
  display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 18px; padding: 32px;
  width: 100%; max-width: 440px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  animation: mIn 0.2s ease;
}
.modal-lg { max-width: 620px; }
@keyframes mIn { from { opacity: 0; transform: translateY(-10px) scale(0.97); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.modal-header h2 { font-size: 20px; font-weight: 700; color: #0f172a; }
.modal-close { cursor: pointer; font-size: 22px; color: #94a3b8; background: none; border: none; }
.modal-close:hover { color: #ef4444; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid #e2e8f0; border-radius: 9px;
  font-size: 14px; color: #1e293b; outline: none; background: #fff; transition: border-color 0.18s;
}
.form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { margin-top: 18px; text-align: center; font-size: 13px; color: #64748b; }
.modal-footer a { color: #6366f1; cursor: pointer; font-weight: 500; }
.form-err { color: #ef4444; font-size: 12px; margin-top: 6px; display: none; }
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 13px 18px;
  border-radius: 11px; font-size: 13.5px; font-weight: 500; color: #fff;
  z-index: 9999; transform: translateY(10px); opacity: 0; transition: all 0.25s;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15); max-width: 320px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-success { background: #22c55e; }
.toast-error { background: #ef4444; }
.toast-info { background: #6366f1; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 768px) {
  .search-box { grid-template-columns: 1fr 1fr; }
  .hero h1 { font-size: 28px; }
  .apt-grid, .section-title { padding-left: 16px; padding-right: 16px; }
  .navbar { padding: 0 16px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">🏠 Pet<span>Booking</span></div>
  <div class="nav-actions">
    <button class="btn btn-outline" onclick="openModal('login-modal')">Войти</button>
    <button class="btn btn-primary" onclick="openModal('reg-modal')">Регистрация</button>
  </div>
</nav>

<div class="hero">
  <h1>Найдите идеальное жильё</h1>
  <p>Тысячи квартир по всей России для вашего путешествия</p>
  <div class="search-box">
    <div class="fg"><label>Город</label><input id="s-city" type="text" placeholder="Москва"></div>
    <div class="fg"><label>Заезд</label><input id="s-in" type="date"></div>
    <div class="fg"><label>Выезд</label><input id="s-out" type="date"></div>
    <div class="fg"><label>Гостей</label><input id="s-guests" type="number" min="1" value="1"></div>
    <button class="btn btn-primary" onclick="searchApts()">🔍 Найти</button>
  </div>
</div>

<div class="section-title" id="apts-title">Введите параметры поиска</div>
<div class="apt-grid" id="apt-grid">
  <div style="grid-column:1/-1;text-align:center;padding:56px;color:#94a3b8;">
    <div style="font-size:48px;margin-bottom:12px;">🔍</div>
    <p>Укажите город и даты для поиска квартир</p>
  </div>
</div>

<!-- Apt detail modal -->
<div id="apt-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="apt-modal-name">Квартира</h2>
      <button class="modal-close" onclick="closeModal('apt-modal')">✕</button>
    </div>
    <div id="apt-modal-body"></div>
  </div>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Вход</h2>
      <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    </div>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="l-email" class="form-control" type="email" placeholder="user@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input id="l-pass" class="form-control" type="password" placeholder="••••••••" required>
      </div>
      <div class="form-err" id="login-err"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;" id="login-btn">Войти</button>
    </form>
    <div class="modal-footer">Нет аккаунта? <a onclick="closeModal('login-modal');openModal('reg-modal')">Зарегистрироваться</a></div>
  </div>
</div>

<!-- Register Modal -->
<div id="reg-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Регистрация</h2>
      <button class="modal-close" onclick="closeModal('reg-modal')">✕</button>
    </div>
    <form onsubmit="doRegister(event)">
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Имя</label><input id="r-fn" class="form-control" type="text" placeholder="Иван" required></div>
        <div class="form-group"><label class="form-label">Фамилия</label><input id="r-ln" class="form-control" type="text" placeholder="Иванов" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input id="r-email" class="form-control" type="email" placeholder="user@example.com" required></div>
      <div class="form-group"><label class="form-label">Пароль</label><input id="r-pass" class="form-control" type="password" placeholder="Минимум 6 символов" required minlength="6"></div>
      <div class="form-group">
        <label class="form-label">Роль</label>
        <select id="r-role" class="form-control">
          <option value="CLIENT">Клиент — ищу жильё</option>
          <option value="LANDLORD">Арендодатель — сдаю жильё</option>
        </select>
      </div>
      <div class="form-err" id="reg-err"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;" id="reg-btn">Создать аккаунт</button>
    </form>
    <div class="modal-footer">Уже есть аккаунт? <a onclick="closeModal('reg-modal');openModal('login-modal')">Войти</a></div>
  </div>
</div>

<script>
const API = 'http://localhost:8555';
const BGRADS = ['linear-gradient(135deg,#6366f1,#8b5cf6)','linear-gradient(135deg,#0ea5e9,#6366f1)','linear-gradient(135deg,#10b981,#0ea5e9)','linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#ec4899,#8b5cf6)'];
const EMOJIS = ['🏠','🏡','🏘','🏢','🌇','🌆','🏙','🌃'];

window.addEventListener('DOMContentLoaded', () => {
  const u = localStorage.getItem('currentUser');
  const t = localStorage.getItem('accessToken');
  if (u && t) {
    const user = JSON.parse(u);
    const pages = {CLIENT:'client.html',LANDLORD:'landlord.html',ADMIN:'admin.html'};
    window.location.href = pages[user.role] || 'index.html';
    return;
  }
  const today = new Date();
  const d1 = new Date(today); d1.setDate(d1.getDate()+1);
  const d2 = new Date(today); d2.setDate(d2.getDate()+7);
  document.getElementById('s-in').value  = d1.toISOString().slice(0,10);
  document.getElementById('s-out').value = d2.toISOString().slice(0,10);
});

function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }
document.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); });

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`; el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
}

async function searchApts() {
  const city   = document.getElementById('s-city').value.trim();
  const sDate  = document.getElementById('s-in').value;
  const eDate  = document.getElementById('s-out').value;
  const guests = document.getElementById('s-guests').value;
  if (!city || !sDate || !eDate) { toast('Заполните все поля поиска', 'error'); return; }
  if (sDate >= eDate) { toast('Дата выезда должна быть позже заезда', 'error'); return; }

  const grid = document.getElementById('apt-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;"><div style="width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>Ищем...</div>';
  document.getElementById('apts-title').textContent = `Квартиры в городе "${city}"`;

  const params = new URLSearchParams({city, startDate:sDate, endDate:eDate, guests, size:20});
  try {
    const res = await fetch(`${API}/api/apartments?${params}`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const items = data.content || data;
    if (!items.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:56px;color:#94a3b8;"><div style="font-size:44px;margin-bottom:10px;">🔍</div><p>Квартиры не найдены</p></div>';
      return;
    }
    grid.innerHTML = items.map((a,i) => `
      <div class="apt-card" onclick='showDetail(${JSON.stringify(a).replace(/'/g,"&#39;")}, "${sDate}", "${eDate}")'>
        <div class="apt-thumb" style="background:${BGRADS[i%BGRADS.length]}">${EMOJIS[i%EMOJIS.length]}</div>
        <div class="apt-body">
          <div class="apt-name">${esc(a.name)}</div>
          <div class="apt-city">📍 ${esc(a.city)}${a.street ? ', '+esc(a.street) : ''}</div>
          <div class="apt-footer">
            <div class="apt-price">${fmtM(a.pricePerNight)}<span>/ночь</span></div>
            <div class="apt-rating">⭐ ${(a.averageRating||0).toFixed(1)} · до ${a.maxGuests} гостей</div>
          </div>
        </div>
      </div>`).join('');
  } catch(err) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:#ef4444;">⚠ Ошибка: ${esc(err.message)}</div>`;
  }
}

function showDetail(a, sDate, eDate) {
  document.getElementById('apt-modal-name').textContent = a.name;
  const nights = Math.round((new Date(eDate)-new Date(sDate))/(1000*60*60*24));
  const total  = (a.pricePerNight||0) * nights;
  document.getElementById('apt-modal-body').innerHTML = `
    <div style="height:170px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:20px;">🏠</div>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px;font-size:13.5px;">
      <span>📍 <b>${esc(a.city)}</b>${a.street?', '+esc(a.street):''}</span>
      <span>💰 <b>${fmtM(a.pricePerNight)}</b>/ночь</span>
      <span>👥 До <b>${a.maxGuests}</b> гостей</span>
      <span>⭐ <b>${(a.averageRating||0).toFixed(1)}</b></span>
    </div>
    ${a.description ? `<p style="font-size:14px;color:#475569;margin-bottom:16px;">${esc(a.description)}</p>` : ''}
    ${a.amenities?.size||a.amenities?.length ? `<div style="margin-bottom:16px;"><b style="font-size:13px;">Удобства</b><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${[...(a.amenities)].map(x=>`<span style="background:#f1f5f9;padding:3px 10px;border-radius:20px;font-size:12px;">${esc(x)}</span>`).join('')}</div></div>` : ''}
    <div style="background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:16px;font-size:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>${fmtM(a.pricePerNight)} × ${nights} ночей</span><span>${fmtM(total)}</span></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="closeModal('apt-modal');openModal('login-modal')">Войти чтобы забронировать</button>
  `;
  openModal('apt-modal');
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  btn.textContent = 'Вход...'; btn.disabled = true; err.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:document.getElementById('l-email').value, password:document.getElementById('l-pass').value})
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.message||'Неверный email или пароль'); }
    const tokens = await res.json();
    localStorage.setItem('accessToken', tokens.accessToken);
    if (tokens.refreshToken) localStorage.setItem('refreshToken', tokens.refreshToken);
    const me = await fetch(`${API}/api/users/me`, {headers:{'Authorization':`Bearer ${tokens.accessToken}`}});
    const user = await me.json();
    localStorage.setItem('currentUser', JSON.stringify(user));
    const pages = {CLIENT:'client.html',LANDLORD:'landlord.html',ADMIN:'admin.html'};
    window.location.href = pages[user.role]||'index.html';
  } catch(ex) { err.textContent=ex.message; err.style.display='block'; btn.textContent='Войти'; btn.disabled=false; }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const err = document.getElementById('reg-err');
  btn.textContent = 'Создание...'; btn.disabled = true; err.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({firstName:document.getElementById('r-fn').value, lastName:document.getElementById('r-ln').value, email:document.getElementById('r-email').value, password:document.getElementById('r-pass').value, role:document.getElementById('r-role').value})
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.message||'Ошибка регистрации'); }
    const tokens = await res.json();
    localStorage.setItem('accessToken', tokens.accessToken);
    if (tokens.refreshToken) localStorage.setItem('refreshToken', tokens.refreshToken);
    const me = await fetch(`${API}/api/users/me`, {headers:{'Authorization':`Bearer ${tokens.accessToken}`}});
    const user = await me.json();
    localStorage.setItem('currentUser', JSON.stringify(user));
    const pages = {CLIENT:'client.html',LANDLORD:'landlord.html',ADMIN:'admin.html'};
    window.location.href = pages[user.role]||'index.html';
  } catch(ex) { err.textContent=ex.message; err.style.display='block'; btn.textContent='Создать аккаунт'; btn.disabled=false; }
}

function fmtM(n) { return new Intl.NumberFormat('ru-RU').format(n||0)+' ₽'; }
function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
