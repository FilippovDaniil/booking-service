name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

# Отменяет предыдущий запуск для той же ветки/PR при новом пуше
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: тесты — запускается на каждый PR и push
  # ─────────────────────────────────────────────
  test:
    name: Test (Java 17)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write          # публикация результатов тестов в виде Check
      pull-requests: write   # комментарий с итогами в PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Кэширует ~/.gradle/caches и ~/.gradle/wrapper между запусками
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # gradlew в Windows-проекте может не иметь executable bit в git
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Профиль test подхватывает src/test/resources/application-test.yml:
      # H2 in-memory, Kafka/Redis autoconfigure excluded, OpenSearch disabled
      - name: Run tests
        run: ./gradlew test --no-daemon

      # Аннотации прямо в diff PR + сводка в разделе Checks
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/**/*.xml
          check_name: Unit & Integration Tests

      # HTML-отчёт для ручного разбора (7 дней)
      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: сборка JAR — только при мерже в master
  # ─────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Тесты уже прошли в job «test», здесь только собираем артефакт
      - name: Build bootJar
        run: ./gradlew bootJar -x test --no-daemon

      # Артефакт живёт 1 день — его подхватывает docker.yml в этом же запуске
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 1
