name: Release

# Запускается только при пуше тега вида v1.0.0, v1.2.3-rc1 и т.д.
# Тег создаётся вручную: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write    # создание GitHub Release и загрузка assets

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Полная история нужна для корректной генерации changelog
          fetch-depth: 0

      # Создаёт GitHub Release.
      # generate_release_notes: true — GitHub сам формирует changelog
      #   из коммитов и merged PR между текущим и предыдущим тегом.
      # prerelease: автоматически если тег содержит -rc, -beta, -alpha.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          # Вставляем заголовок с версией
          name: Release ${{ github.ref_name }}
