name: Dependency Review

# Запускается только при открытии/обновлении PR — сравнивает зависимости base и head.
# Если новая зависимость имеет HIGH или CRITICAL CVE — workflow проваливается.
# Это blocking check: merge невозможен пока не будет исправлен (при включённой защите ветки).
on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write    # добавляет комментарий с итогами в PR

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Официальный экшен GitHub: сравнивает граф зависимостей base vs head коммита.
      # Блокирует PR если добавлена зависимость с уязвимостью ≥ HIGH.
      # comment-summary-in-pr: пишет сводку прямо в PR-комментарий.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # Лицензионная политика: запрещаем добавление зависимостей с указанными лицензиями.
          # Uncomment если нужен license compliance:
          # deny-licenses: GPL-2.0, AGPL-3.0
