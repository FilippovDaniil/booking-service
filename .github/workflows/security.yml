name: Security Scan

on:
  push:
    branches: [master, main]
  schedule:
    # Каждый понедельник в 08:00 UTC — ловит новые CVE в уже задеплоенных образах
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Trivy — сканирование Docker-образа на известные уязвимости
  # Запускается при каждом push в master
  # ─────────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy – Container Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write    # загрузка SARIF → Security → Code scanning alerts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Собираем образ локально (без push) для сканирования.
      # cache-from переиспользует слои от docker.yml — Gradle не качается заново.
      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pet-booking:scan
          cache-from: type=gha

      # Сканируем на CRITICAL и HIGH.
      # exit-code: 0 — не блокируем pipeline, только фиксируем в Security tab.
      # Переключи на exit-code: 1 чтобы блокировать merge при наличии CRITICAL.
      - name: Run Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pet-booking:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      # hashFiles проверяет что файл создан — если Docker build упал, файла нет
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: OWASP Dependency Check — анализ зависимостей по CVE-базе
  # Запускается только по расписанию и вручную (~5 мин, тяжёлая задача)
  # ─────────────────────────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Формируем аргументы: добавляем --nvdApiKey только если секрет задан.
      # Без ключа работает, но медленнее (NVD rate-limit).
      # Добавить ключ: Settings → Secrets → Actions → NVD_API_KEY
      # Получить бесплатно: https://nvd.nist.gov/developers/request-an-api-key
      - name: Prepare OWASP args
        id: owasp-args
        run: |
          ARGS="--enableRetired"
          if [ -n "$NVD_KEY" ]; then
            ARGS="$ARGS --nvdApiKey $NVD_KEY"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
        env:
          NVD_KEY: ${{ secrets.NVD_API_KEY }}

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'pet-booking'
          path: '.'
          format: 'SARIF'
          args: ${{ steps.owasp-args.outputs.args }}

      - name: Upload Dependency Check SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dependency-check
